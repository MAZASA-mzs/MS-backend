repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
-   repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
    -   id: black
-   repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
    -   id: flake8
-   repo: local
    hooks:
        - id: pytest
          name: Run pytest
          entry: pytest
          language: system
          types: [python]
          pass_filenames: false
          always_run: true
